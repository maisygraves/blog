<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <style>
            body {
                font-family: Arial, sans-serif;
                margin: 0;
                padding: 0;
            }
            
            header {
                background-color: #ffffff;
                color: #000000;
                text-align: center;
            }

            nav {
                background-color: #242424;
                padding: 10px;
            }

            nav a {
                color: #fff;
                text-decoration: none;
                padding: 10px;
                margin-right: 10px;
                display: inline-block;
            }

            .container {
                display: flex;
                justify-content: space-between;
                max-width: 95%;
                margin: 0 auto;
                padding: 20px;
            }

            article p {
                text-align: justify;
            }

            main {
                flex: 2;
            }

            article {
                margin-bottom: 20px;
                padding: 10px 20px;
                border: 1px solid rgb(145, 145, 145);
                margin-right: 10px;
            }

            aside {
                flex: 1;
                background-color: #c9c9c9;
                padding: 10px;
            }

            footer {
                background-color: #242424;
                color: #fff;
                text-align: center;
                position: fixed;
                bottom: 0;
                width: 100%;
            }
        </style>
        <title>mtropy blog</title>
    </head>

    <body>
        <header>
            <h3>A Lifelong Learner's Blog</h3>
            <p>I'm dedicated to building a more tolerant and 
                nuanced world. By committing to intellectual 
                transparency and documenting my learning process in 
                real-time, I aim to invite dialogue, welcome feedback, 
                and foster a culture of continuous improvement.
            </p>
        </header>
    </body>   
</html>
